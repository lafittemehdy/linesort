# Defines the CI transition system: tests establish behavior and packaging validates release artifacts.
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Compile TypeScript
        run: pnpm run compile

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb x11-xserver-utils

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm test

      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        run: pnpm test

  package:
    name: Package extension
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: linesort-vsix
          path: "*.vsix"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [test, package]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          for result in "${{ needs.test.result }}" "${{ needs.package.result }}"; do
            if [ "$result" != "success" ]; then
              echo "CI did not pass."
              exit 1
            fi
          done
