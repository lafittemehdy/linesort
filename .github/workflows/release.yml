# Publishes a validated VSIX from immutable version tags.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck and lint
        run: pnpm run pretest

      - name: Install Linux display dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb x11-xserver-utils

      - name: Run tests
        run: xvfb-run --auto-servernum pnpm exec vscode-test

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Check marketplace token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT is required to publish the validated VSIX to the VS Code Marketplace."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies -p "$VSCE_PAT"
